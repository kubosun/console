apiVersion: v1
kind: Service
metadata:
  name: kubosun-backend
  labels:
    app.kubernetes.io/name: kubosun
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: kubosun
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: kubosun-frontend
  labels:
    app.kubernetes.io/name: kubosun
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: kubosun
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubosun
  labels:
    app.kubernetes.io/name: kubosun
---
apiVersion: v1
kind: Secret
metadata:
  name: kubosun-secrets
type: Opaque
stringData:
  KUBOSUN_ANTHROPIC_API_KEY: "REPLACE_ME"
  KUBOSUN_SESSION_SECRET: "REPLACE_ME"
  KUBOSUN_OAUTH_CLIENT_ID: "kubosun-console"
  KUBOSUN_OAUTH_CLIENT_SECRET: "REPLACE_ME"
  KUBOSUN_OAUTH_ISSUER_URL: "https://oauth.cluster.example.com"
  KUBOSUN_OAUTH_REDIRECT_URI: "https://kubosun.example.com/auth/callback"
