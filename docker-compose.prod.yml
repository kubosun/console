services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./backend/.env.local
    environment:
      - KUBOSUN_K8S_IN_CLUSTER=true
      - KUBOSUN_CORS_ORIGINS=["http://localhost:3000"]
    restart: unless-stopped
